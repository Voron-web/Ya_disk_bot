name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ya_bot:latest

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Проверяем что ключ записался корректно
          echo "Key size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          head -1 ~/.ssh/id_ed25519 | grep -q 'BEGIN' && echo 'Key header: OK' || echo 'Key header: MISSING'
          tail -1 ~/.ssh/id_ed25519 | grep -q 'END' || tail -2 ~/.ssh/id_ed25519 | head -1 | grep -q 'END' && echo 'Key footer: OK' || echo 'Key footer: MISSING'

      - name: Deploy to server
        run: |
          # Port knocking через nc
          for port in ${{ secrets.KNOCK_SEQUENCE }}; do
            nc -z -w1 ${{ secrets.SERVER_HOST }} $port 2>/dev/null || true
          done
          sleep 1

          # Деплоим СРАЗУ
          # Добавлен KexAlgorithms=curve25519-sha256 для отключения sntrup761x25519-sha512@openssh.com
          # (Новый Post-Quantum алгоритм в OpenSSH 9.x генерирует огромные пакеты, которые дропаются NAT/Фаерволами)
          ssh -T -o StrictHostKeyChecking=accept-new -o KexAlgorithms=curve25519-sha256,curve25519-sha256@libssh.org -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} git@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e

            cd ~/ya_bot

            # Останавливаем и удаляем старый контейнер
            docker stop ya_bot || true
            docker rm ya_bot || true
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/ya_bot:latest || true

            # Скачиваем новый образ
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ya_bot:latest

            # Запускаем новый контейнер
            docker run -d \
              -v ./error.log:/app/error.log \
              -v ./data.json:/app/data.json \
              -v ./.env:/app/.env.production \
              -e NODE_ENV=production \
              --memory=2500m \
              --cpus=2 \
              --log-opt max-size=50m \
              --log-opt max-file=3 \
              --name ya_bot \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/ya_bot:latest

            # Чистим неиспользуемые образы
            docker image prune -f
          EOF
